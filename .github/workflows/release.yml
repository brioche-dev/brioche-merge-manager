name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: brioche-merge-manager
            archive: brioche-merge-manager-linux-x86_64.tar.gz
            use_cross: true

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: brioche-merge-manager
            archive: brioche-merge-manager-linux-aarch64.tar.gz
            use_cross: true

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: brioche-merge-manager
            archive: brioche-merge-manager-macos-x86_64.tar.gz
            use_cross: false

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: brioche-merge-manager
            archive: brioche-merge-manager-macos-aarch64.tar.gz
            use_cross: false

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: brioche-merge-manager.exe
            archive: brioche-merge-manager-windows-x86_64.zip
            use_cross: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build release binary
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --locked --target ${{ matrix.target }}

      - name: Package (tar)
        if: ${{ !endsWith(matrix.archive, '.zip') }}
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "../../../${{ matrix.archive }}" ${{ matrix.artifact }}

      - name: Package (zip)
        if: endsWith(matrix.archive, '.zip')
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target\${{ matrix.target }}\release\${{ matrix.artifact }}" `
            -DestinationPath "${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
